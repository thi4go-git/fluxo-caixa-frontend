<div id="layoutSidenav_nav">
    <nav class="sb-sidenav app-sidebar" id="sidenavAccordion" aria-label="Menu principal">
        <div class="sb-sidenav-menu">
            <div class="nav">
                <div class="sidebar-section">Principal</div>

                <a class="nav-link" routerLink="/graficos/dashboard-metabase" routerLinkActive="active"
                    (click)="fecharMenuMobile()"
                    [routerLinkActiveOptions]="{ exact: true }">
                    <mat-icon>dashboard</mat-icon>
                    <span>Dashboard</span>
                </a>

                <a class="nav-link" routerLink="/lancamento/listagem" routerLinkActive="active"
                    (click)="fecharMenuMobile()">
                    <mat-icon>description</mat-icon>
                    <span>Lançamentos</span>
                </a>

                <a class="nav-link" routerLink="/naturezas/lista" routerLinkActive="active"
                    (click)="fecharMenuMobile()">
                    <mat-icon>category</mat-icon>
                    <span>Naturezas</span>
                </a>

                <div class="sidebar-section">Conta</div>

                <a class="nav-link logout-link" (click)="logout()" (keydown.enter)="logout()" role="button" tabindex="0">
                    <mat-icon>logout</mat-icon>
                    <span>Sair</span>
                </a>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar">
                    <mat-icon>person</mat-icon>
                </div>
                <div class="user-info">
                    <span>Usuário logado</span>
                    <strong>{{ usuarioLogado }}</strong>
                </div>
            </div>
            <small>Versão {{ versao }}</small>
        </div>
    </nav>
</div>
